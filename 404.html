<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>XYZ Farms</title>
  <script>
    // Redirect deep links back to the SPA entry point, preserving the path
    // so React Router can handle it. Based on spa-github-pages technique.
    var l = window.location;
    var base = l.pathname.split('/').slice(0, 2).join('/'); // e.g. /oecommerce
    l.replace(
      l.protocol + '//' + l.host + base + '/?p=' +
      encodeURIComponent(l.pathname.slice(base.length) + l.search) +
      (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
    );
  </script>
</head>
<body></body>
</html>
